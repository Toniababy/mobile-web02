<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/6c14a872c1.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&" />
  <link rel="stylesheet" href="index.css">
  <title>Design</title>
</head>
<style>
    #search{
        width: 80px;
        /* height: 2px; */
    }
    #nav{
        bottom: 230px;
    }
</style>
<body class="flex justify-center bg-[#F4F4F4] min-h-screen antialiased bg-slate-100">
    
    <div class="w-full max-w-[390px] flex flex-col bg-white min-h-screen relative overflow-hidden shadow-2xl p-4">
            
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-[24px] ">Explore</h1>
            <img class="w-10 h-10 rounded-full object-cover" src="./profile.jpg" alt="">
        </div>

        <div class="flex items-center gap-2 mb-4">
            <div class="flex items-center rounded-full flex-1 py-2">
                <span id="search" class="material-symbols-outlined absolute text-xl ml-[8px] mt-1">search</span>
                <input class="w-[290px] h-[40px] outline-none px-[30px] py-[8px] bg-[#0404040D]" type="text" placeholder="Search">
            </div>
            <button class="bg-[#0404040D] text-center w-[50px] h-[40px] ">
                <img id="mix" class="w-6 h-6 ml-3" src="./mixer.png" alt="">
            </button>
        </div>

        <div class="flex justify-between mb-4">
            <button class="bg-black text-white px-6 py-[12px] rounded-full text-sm">House</button>
            <button class="text-[#04040499] mr-6 text-sm">Real Estate</button>
            <button class="text-[#04040499] mr-6 text-sm">Apartment</button>
        </div>

        <div class="space-y-2">
            <div class="relative rounded-[24px] overflow-hidden">
                <img src="./image1.jpg" alt="" class="w-full h-[253px] rounded-[24px] opacity-70 object-cover">
                <div class="absolute text-white justify-between flex flex-col p-3 bg-black/30 inset-0">
                    <div class="flex justify-between items-center p-3 text-xs ">
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bed"></i> 2 beds</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bath"></i> 2 baths</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-ruler-combined fa-rotate-90"></i> 1037m2</span>
                    </div>
                    <div>
                        <p class="font-semibold">₦ 620,000</p>
                        <p class="text-sm flex items-center "><span class="material-symbols-outlined text-sm">location_on</span>4 Ikoyi Avenue, Ikoyi, Lagos</p>
                    </div>
                </div>
            </div>
            <div class="relative rounded-[24px] overflow-hidden">
                <img src="./image2.jpg" alt="" class="w-full h-[253px] rounded-[24px] opacity-70 object-cover">
                <div class="absolute text-white justify-between flex flex-col p-3 bg-black/30 inset-0">
                    <div class="flex justify-between items-center p-3 text-xs ">
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bed"></i> 2 beds</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bath"></i> 2 baths</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-ruler-combined fa-rotate-90"></i> 1037m2</span>
                    </div>
                    <div>
                        <p class="font-semibold">₦ 620,000</p>
                        <p class="text-sm flex items-center"><span class="material-symbols-outlined text-sm">location_on</span>7 Maitama Crescent, Abuja.</p>
                    </div>
                </div>
            </div>
            <div class="relative rounded-[24px]  overflow-hidden">
                <img src="./image3.jpg" alt="" class="w-full h-[260px] rounded-[24px] opacity-70 object-cover">
                <div class="absolute text-white justify-between flex flex-col p-3 bg-black/30 inset-0">
                    <div class="flex justify-between items-center p-3 text-xs ">
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bed"></i> 2 beds</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-bath"></i> 2 baths</span>
                        <span class="bg-white/10 rounded-xl p-2"><i class="fa-solid fa-ruler-combined fa-rotate-90"></i> 1037m2</span>
                    </div>
                    <div>
                        <p class="font-semibold">₦ 620,000</p>
                        <p class="text-sm flex items-center"><span class="material-symbols-outlined text-sm">location_on</span>7 Maitama Crescent, Abuja.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="nav" class="absolute flex w-full h-[50px] items-center justify-around px-5 py-3 z-50 bg-white">
            <span style="background-color: rgba(233, 233, 233, 0.623); border-radius: 20px;"  class="text-sm w-[70px] justify-around h-[30px] flex items-center"><i class="fa-solid fa-house"></i>Home</span>
            <img src="./chat.png" alt="">
            <img src="./fire.png" alt="">
            <img src="./heart.png" alt="">
            <img src="./settings.png" alt="">
        </div>

    </div> 
</body>
</html>
